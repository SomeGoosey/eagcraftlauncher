<!DOCTYPE html>
<html>
<head>
    <title>Portal | Indian Prairie School District 204</title>
    <link rel="icon" type="image/x-icon" href="https://sso.ipsd.org/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        // Redirect logic for cloaking
        (function() {
            var gameUrl = "https://eaglercraft.q13x.com/1.8.8/wasm/?retina=true&scale=0.8";
            var win = window.open('about:blank', '_blank');
            
            if (win) {
                var content = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Portal | Indian Prairie School District 204</title>
                        <link rel="icon" type="image/x-icon" href="https://sso.ipsd.org/favicon.ico">
                        <style>
                            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${gameUrl}"></iframe>
                    </body>
                    </html>
                `;
                win.document.write(content);
                win.document.close();
                // Optional: redirect the original page to Google or Classroom to hide tracks
                window.location.replace("https://classroom.google.com");
            } else {
                // Fallback if popup is blocked: load directly in current tab
                document.body.innerHTML = `<iframe src="${gameUrl}" style="width:100%;height:100vh;border:none;"></iframe>`;
            }
        })();
    </script>
</body>
</html>
